body:
  id: itu-t
  name: International Telecommunication Union - Telecommunication Standardization Sector
  short_name: ITU-T
  url: https://www.itu.int/itu-t
  scope: >
    UN treaty body. Develops Recommendations that member states use as
    references in national regulation. Quantum work is split across
    Study Groups: SG13 (network architecture, lead on Y.3800 QKDN series
    and quantum-network supplements), SG17 (security, X.17xx series),
    SG11 (signalling, Q.4160 series), SG15 (transport, sync).
  notes: >
    Y.3800-series covers QKD networks. X.17xx covers QKDN security.
    Q.416x covers QKDN signalling. Y.Sup98 (2025) is the first
    substantive ITU-T document on entanglement-based quantum networks
    and lays out a seven-Study-Group roadmap. The pre-standardisation
    feeder was FG-QIT4N (Focus Group on Quantum Information Technology
    for Networks, 2019-2021).

