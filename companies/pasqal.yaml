milestones:
  - date: 2026-03
    tag: qc
    headline: >
      Announces business combination with Bleichroeder Acquisition Corp II;
      Nasdaq listing planned 2026, Euronext Paris dual-listing to follow;
      EUR 340M new financing (EUR 170M private round + EUR 170M convertible)
    source_url: https://www.pasqal.com/newsroom/pasqal-a-global-leader-in-neutral-atom-quantum-computing-to-go-public-via-business-combination-with-bleichroeder-acquisition-corp-ii/
    source_type: press
  - date: 2026-02
    tag: qc
    headline: >
      Delivers 140-qubit Orion-class neutral-atom QPU to CINECA (Bologna) under
      EuroHPC EuroQCS-Italy contract
    source_url: https://thequantuminsider.com/2026/02/17/pasqal-neutral-atom-qpu-italy/
    source_type: press
  - date: 2025-10
    tag: qc
    headline: >
      Saudi Arabia's first quantum computer — 200-qubit neutral-atom system —
      goes live at Saudi Aramco's data centre in Dhahran
    source_url: https://www.aramco.com/en/news-media/news/2025/aramco-and-pasqal-make-history-with-saudi-arabias-first-quantum-computer
    source_type: press
  - date: 2025-06
    tag: qc
    headline: >
      Releases updated 2025 roadmap — upgradable Orion / Vela / Centaurus /
      Lyra platform path toward early FTQC by 2028, impactful FTQC by 2029
    source_url: https://www.pasqal.com/newsroom/pasqal-releases-2025-roadmap/
    source_type: press
  - date: 2024-11
    tag: qc
    headline: >
      Inaugurates Orion Beta ("Ruby") QPU at GENCI/CEA (Saclay) and a second
      Pasqal QPU at Forschungszentrum Jülich under the HPCQS programme
    source_url: https://www.pasqal.com/newsroom/pasqal-drives-europes-quantum-industrialization-with-the-integration-of-two-qpus-into-europes-first-hybrid-hpc-quantum-infrastructure/
    source_type: press
  - date: 2024
    tag: qc
    headline: >
      Exceeds 1,000 trapped neutral atoms in a single processor array
    source_url: https://www.pasqal.com/newsroom/pasqal-exceeds-1000-atoms-in-quantum-processor/
    source_type: press
  - date: 2023-01
    tag: qc
    headline: >
      Closes EUR 100M Series B led by Temasek to scale neutral-atom hardware
    source_url: https://www.pasqal.com/newsroom/pasqal-raises-e100-million-series-b-funding-to-advance-neutral-atoms-quantum-computing/
    source_type: press

roadmap:
  - target: 2025
    item: >
      Orion Gamma — 140+ physical qubits, third Orion generation; 2 logical
      qubits demonstrated
    source_url: https://www.pasqal.com/newsroom/pasqal-releases-2025-roadmap/
    tag: qc
  - target: 2026
    item: >
      250-qubit QPU targeted at quantum advantage on an industry-relevant
      problem (first half of 2026)
    source_url: https://www.pasqal.com/newsroom/pasqal-releases-2025-roadmap/
    tag: qc
  - target: 2027
    item: >
      Vela generation — 200+ physical qubits, 20 logical qubits
    source_url: https://www.pasqal.com/newsroom/pasqal-releases-2025-roadmap/
    tag: qc
  - target: 2028
    item: >
      Centaurus generation — ~10,000 physical qubits, early fault-tolerant
      quantum computing (early FTQC)
    source_url: https://www.pasqal.com/newsroom/pasqal-releases-2025-roadmap/
    tag: qc
  - target: 2029
    item: >
      Lyra generation — 100 high-fidelity logical qubits, impactful FTQC;
      two-qubit gate fidelity target 99.9%
    source_url: https://www.pasqal.com/newsroom/pasqal-releases-2025-roadmap/
    tag: qc

current_flagship:
  name: Orion Beta
  generation: neutral-atom Orion (Rb-87, programmable tweezer array)

