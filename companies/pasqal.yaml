slug: pasqal
name: Pasqal
categories: [qc]
hq: Palaiseau, France
founded: 2019
status: private
parent: null
logo:
  domain: pasqal.com

positioning: >
  French neutral-atom quantum computing company spun out of Institut d'Optique
  (Alain Aspect, Antoine Browaeys, Thierry Lahaye). Builds rubidium-87 optical
  tweezer arrays that run both analog Hamiltonian-simulation and digital
  gate-based modes; the only neutral-atom vendor with QPUs installed in
  EuroHPC supercomputing centres and a commercial deployment in the Gulf.

