    source_type: press
  - date: 2025-07
    tag: network
    headline: Carina announced as first commercially available rack-mounted quantum-networking system (entangled-pair source + APC + detection + orchestration in a server rack form factor)
    source_url: https://www.qunnect.inc/posts/2025-07-31
    source_type: press
  - date: 2025-06
    tag: network
    headline: Oversubscribed Series A extension closes at $10M, led by Airbus Ventures with Cisco Investments, Medina Ventures, Quantonation
    source_url: https://www.qunnect.inc/press-release-2025-06-24
    source_type: press
  - date: 2025-03
    tag: memory
    headline: Telecom-compatible photon-memory entanglement demonstrated with warm-vapour Rb memory at room temperature (86.5% fidelity, >1200 pairs/s)
    source_url: https://arxiv.org/abs/2503.11564
    source_type: preprint
  - date: 2024-08
    tag: network
    headline: PRX Quantum 5, 030330 — 15 days continuous polarization-entanglement distribution over 34 km of NYC deployed fibre, 99.84% uptime, 500k pairs/s through 17 dB-loss commercial channels
    source_url: https://journals.aps.org/prxquantum/abstract/10.1103/PRXQuantum.5.030330
    source_type: paper
  - date: 2024-04
    tag: network
    headline: arXiv preprint of GothamQ automated polarization-entanglement distribution (later published in PRX Quantum)
    source_url: https://arxiv.org/abs/2404.08626
    source_type: preprint
  - date: 2023-01
    tag: network
    headline: GothamQ testbed extended into Manhattan; connects Brooklyn Navy Yard HQ to Manhattan and Queens over ~300 km of leased commercial telecom fibre
    source_url: https://www.prnewswire.com/news-releases/qunnects-quantum-networking-testbed-gothamq-enters-the-manhattan-borough-301723595.html
    source_type: press
  - date: 2022-10
    tag: memory
    headline: Series A — $8M led by Airbus Ventures with Quantonation, SandboxAQ, NY Ventures, Impact Science Ventures, Motus Ventures
    source_url: https://www.prnewswire.com/news-releases/qunnect-raises-8m-in-series-a-funding-led-by-airbus-ventures-301641331.html
    source_type: press
  - date: 2022
    tag: memory
    headline: Field-deployable warm-vapour Rb quantum memory demonstrated outside the lab (Phys. Rev. Applied 18, 044058)
    source_url: https://journals.aps.org/prapplied/abstract/10.1103/PhysRevApplied.18.044058
    source_type: paper
  - date: 2021-11
    tag: memory
    headline: First commercial quantum-memory unit sold (Qu-Mem / "Quark" room-temperature Rb memory)
    source_url: https://www.prnewswire.com/news-releases/qunnect-announces-sale-of-first-commercial-quantum-memory-301428820.html
