  - date: 2017
    tag: memory
    headline: Company founded as Stony Brook University spin-out from Eden Figueroa's Quantum Information Technology Lab (co-founders Figueroa, Namazi, Flament, Brill)
    source_url: https://www.rfsuny.org/rf-news/sbu-qunnect-quantum/sbu-qunnect.html
