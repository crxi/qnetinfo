logo:
  domain: qunnect.inc

positioning: >
  Quantum-networking hardware vendor building room-temperature rubidium-vapour
  quantum memories, entangled-photon sources, and telecom-band polarization
  stabilisation gear, packaged as rack-mount appliances. Spun out of Eden
  Figueroa's group at Stony Brook University; operates GothamQ, a leased
  metropolitan dark-fibre testbed running under New York City.

