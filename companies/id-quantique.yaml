slug: id-quantique
name: ID Quantique
categories: [qkd, source-detect, enabling]
hq: Geneva, Switzerland
founded: 2001
status: acquired
parent: ionq
logo:
  domain: idquantique.com

positioning: >
  The longest-running commercial QKD vendor. Spun out of the University of Geneva
  in 2001, sells turnkey fibre-QKD systems (Cerberis / Clavis), single-photon
  detectors (ID230 InGaAs, ID281 SNSPD), and Quantis QRNG chips embedded in
  Samsung Galaxy "Quantum" phones. Founding member of ETSI ISG-QKD. Acquired by
  SK Telecom (majority stake, 2018) then by IonQ (controlling stake, completed
  May 2025).

modalities:
  qkd:
    protocol: [BB84, decoy-state, COW]
    rate_distance: "~14,000 AES-256 keys/hour @ 24 dB loss, up to 150 km SMF (Clavis XG)"
    deployed_demos:
      - note: 800 km nationwide QKD backbone in South Korea with SK Broadband / SKT
        source_url: https://www.idquantique.com/id-quantique-and-sk-telecom-announce-the-worlds-first-5g-smartphone-equipped-with-a-quantum-random-number-generator-qrng-chipset/
      - note: Slovakia's first national quantum communication network (EuroQCI), all QKD hardware supplied by IDQ
        source_url: https://www.idquantique.com/ionq-slovakias-quantum-communication-network/
      - note: ESA EAGLE-1 and E2EQSS satellite-QKD subsystems
        source_url: https://www.idquantique.com/ionq-slovakias-quantum-communication-network/
  source-detect:
    role: detector
    detection_efficiency: null
    dark_count_hz: null
    jitter_ps: 40
  enabling:
    products:
      - Quantis QRNG chip (2.5 x 2.5 mm CMOS, in Samsung Galaxy Quantum series)
      - Quantis QRNG PCIe / USB appliances
      - Clarion KX key-management system

