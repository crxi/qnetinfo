slug: aliro
name: Aliro Quantum
categories: [network, software]
hq: Brighton, Massachusetts, USA
founded: 2019
status: private
parent: null
logo:
  domain: aliroquantum.com

positioning: >
  Quantum-networking software vendor that builds the control, orchestration, and
  simulation stack for entanglement-based networks. A Harvard spin-out (Narang
  Lab); does not build photonic or matter-qubit hardware itself but integrates
  third-party devices into operable networks for telcos, government labs, and
  data-centre operators.

modalities:
  network:
    role: orchestrator
    products: [AliroNet, "AliroNet Quickstart"]
  software:
    products:
      - AliroNet Simulator
      - AliroNet Emulator
      - AliroNet Pilot
      - AliroNet Production

