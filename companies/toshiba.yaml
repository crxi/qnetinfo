slug: toshiba
name: Toshiba (Cambridge Research Laboratory)
categories: [qkd]
hq: Cambridge, UK
founded: 1991
status: public
parent: toshiba
logo:
  domain: toshiba.eu

positioning: >
  Quantum Key Distribution business unit of Toshiba Europe Ltd, run out of the
  Cambridge Research Laboratory (CRL) and led by Andrew Shields. Scope of this
  dossier is the QKD product line and Twin-Field QKD research programme — not
  the wider Toshiba Corporation conglomerate. Ships two commercial QKD systems
  (Multiplexed MU and Long Distance LD) for metro and inter-city deployments,
  with the BT London quantum-secured metro network and the JPMorgan Chase /
  Ciena 800 Gbps co-existence trial as its flagship references.

modalities:
  qkd:
    protocol: [BB84, decoy-state, Twin-Field]
    rate_distance: "MU: >40 kb/s @ 10 dB (~50 km), 30 dB loss budget; LD: 300 kb/s @ 10 dB, 150 km+; TF-QKD: 600 km lab demo"
    deployed_demos:
      - BT–Toshiba London quantum-secured metro network (Docklands / City / M4 corridor), commercial trial launched 2022 with EY as first customer
      - JPMorgan Chase / Toshiba / Ciena — QKD multiplexed with 2x 800 Gbps + 8x 100 Gbps data channels over 70 km production-simulation fibre (2022)
      - National Composites Centre ↔ Centre for Modelling & Simulation (Bristol) — coherent / Twin-Field QKD over deployed telecom fibre (2025, with BT)
      - Quantum Corridor (US Midwest) — first cross-state QKD over live commercial metro fibre (2025)
      - 600 km Twin-Field QKD with dual-band stabilisation, Cambridge lab (Pittaluga et al. 2021)

