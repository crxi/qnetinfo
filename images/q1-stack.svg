<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" role="img" aria-labelledby="q1-title q1-desc">
  <title id="q1-title">Q1 end-to-end · heterogeneous transmon ↔ Diamond-SiV link with a chain of three SiV repeater nodes</title>
  <desc id="q1-desc">Phase 1 entanglement-generation row: Node A (superconducting transmon QC, left) and Node B (Diamond-SiV nanophotonic QC, right) flank a chain of three SiV repeater nodes (R₁, R₂, R₃). Node A's M-O transducer lifts a 5 GHz microwave photon to telecom O-band (1350 nm); the SiV nodes' QFC stages lift 737 nm SiV ZPL photons to 1350 nm (Knaut et al. Nature 629.573, 2024 — PPLN pumped at 1623 nm). Each matter qubit emits an entangled photon (matter-photon entanglement shown as a short vertical wavy line). Four photonic Bell-state measurements between adjacent nodes herald four elementary Bell pairs across the chain — drawn as magenta wavy lines connecting adjacent matter qubits. Phase 1 result row: the four elementary Bell pairs are swapped at the relays to deliver one end-to-end A↔B Bell pair (shown as a long magenta wavy line across the figure). Phase 2 row: a local Bell-state measurement at A consumes the entanglement; two classical bits cross the classical channel; Node B applies the Pauli correction. The fibre is silent in Phase 2.</desc>

  <defs>
    <style>
      .matter      { fill: #22c55e; stroke: #1a1f2a; stroke-width: 1.2; }
      .matter-used { fill: #c9ced6; stroke: #aab0ba; stroke-width: 1.0; }
      .data        { fill: #f29453; stroke: #8a3f0e; stroke-width: 1.2; }
      .photon      { fill: #2f6fd6; stroke: #1a1f2a; stroke-width: 1.0; }
      .ent         { stroke: #c84a9b; stroke-width: 2; fill: none; stroke-linecap: round; }
      .mp-wave     { stroke: #c84a9b; stroke-width: 1.8; fill: none; }
      .photon-path { stroke: #2f6fd6; stroke-width: 1; fill: none; stroke-dasharray: 4 3; opacity: 0.8; }
      .bm-box      { fill: none; stroke: #5a6472; stroke-width: 1.4; stroke-dasharray: 4 3; }
      .classical   { stroke: #e88135; stroke-width: 2.2; stroke-dasharray: 7 3; fill: none; }
      .mo-block    { fill: #fdeacf; stroke: #b8783c; stroke-width: 1.4; }
      .qfc-block   { fill: #e2eef9; stroke: #5a83b3; stroke-width: 1.4; }
      .title       { font: 600 18px "Inter", system-ui, sans-serif; fill: #1a1f2a; text-anchor: middle; }
      .stage       { font: 700 15px "Inter", system-ui, sans-serif; fill: #1a1f2a; letter-spacing: 0.04em; }
      .endpoint    { font: 600 13px "Inter", system-ui, sans-serif; fill: #1a1f2a; text-anchor: middle; }
      .endpoint-sub{ font: 12px "Inter", system-ui, sans-serif; fill: #4a4f57; text-anchor: middle; }
      .matter-lbl  { font: 700 14px "Inter", system-ui, sans-serif; fill: #ffffff; text-anchor: middle; dominant-baseline: middle; }
      .relay-lbl   { font: 600 14px "Inter", system-ui, sans-serif; fill: #5a6472; text-anchor: middle; font-style: italic; }
      .badge-text  { font: 700 12px "Inter", system-ui, sans-serif; text-anchor: middle; }
      .badge-mo    { fill: #8a3f0e; }
      .badge-qfc   { fill: #1d4e7c; }
      .pbsm-lbl    { font: 600 12px "Inter", system-ui, sans-serif; fill: #5a6472; text-anchor: middle; }
      .wave-tag    { font: 11.5px "Inter", system-ui, sans-serif; fill: #2272dd; text-anchor: middle; }
      .ann         { font: 600 13px "Inter", system-ui, sans-serif; fill: #1a1f2a; text-anchor: middle; }
      .leg         { font: 12.5px "Inter", system-ui, sans-serif; fill: #1a1f2a; }
      .result-cap  { font: 13px "Inter", system-ui, sans-serif; fill: #1a1f2a; text-anchor: middle; }
      .bell-lbl    { font: 600 13.5px "Inter", system-ui, sans-serif; fill: #c84a9b; text-anchor: middle; }
      .phase-cap   { font: 12.5px "Inter", system-ui, sans-serif; fill: #4a4f57; text-anchor: middle; }
      .footnote    { font: italic 11px "Inter", system-ui, sans-serif; fill: #6b7280; }
      .bsm-glass   { fill: #d9eef9; stroke: #1a1f2a; stroke-width: 4; stroke-linejoin: round; }
      .bsm-coat    { stroke: #1a1f2a; stroke-width: 3; stroke-linecap: round; }
      .bsm-bs      { fill: #1a1f2a; stroke: none; }
      .bsm-beam    { stroke: #5a6472; stroke-width: 6; fill: none; stroke-linecap: round; }
      .bsm-det     { fill: #1a1f2a; stroke: #1a1f2a; stroke-width: 0.5; }
    </style>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5a6472"/>
    </marker>
    <marker id="carr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#e88135"/>
    </marker>
    <symbol id="bsm-detector" overflow="visible">
      <path class="bsm-det" d="M -14,0 A 14,14 0 0 1 14,0 Z"/>
    </symbol>
    <symbol id="ph-bsm" viewBox="0 0 640 540" overflow="visible">
      <line class="bsm-beam" x1="190" y1="50"  x2="450" y2="310"/>
      <line class="bsm-beam" x1="450" y1="310" x2="510" y2="370"/>
      <line class="bsm-beam" x1="450" y1="310" x2="390" y2="370"/>
      <line class="bsm-beam" x1="450" y1="50"  x2="190" y2="310"/>
      <line class="bsm-beam" x1="190" y1="310" x2="130" y2="370"/>
      <line class="bsm-beam" x1="190" y1="310" x2="250" y2="370"/>
      <rect class="bsm-bs" x="312" y="140" width="16" height="80" rx="4"/>
      <polygon class="bsm-glass" points="190,270 230,310 190,350 150,310"/>
      <line class="bsm-coat" x1="190" y1="270" x2="190" y2="350"/>
      <polygon class="bsm-glass" points="450,270 490,310 450,350 410,310"/>
      <line class="bsm-coat" x1="450" y1="270" x2="450" y2="350"/>
      <use href="#bsm-detector" transform="translate(130,370) rotate(-135)"/>
      <use href="#bsm-detector" transform="translate(250,370) rotate(135)"/>
      <use href="#bsm-detector" transform="translate(390,370) rotate(-135)"/>
      <use href="#bsm-detector" transform="translate(510,370) rotate(135)"/>
    </symbol>
  </defs>

  <!-- ═══════════ Title ═══════════ -->
  <text class="title" x="550" y="28">Q1 end-to-end · heterogeneous transmon ↔ Diamond-SiV link, with three SiV repeater nodes between</text>

  <!-- ═══════════ Endpoint identification (above the matter row, with badges) ═══════════ -->
  <!-- Node A -->
  <text class="endpoint" x="130" y="78">Node A · superconducting transmon</text>
  <text class="endpoint-sub" x="130" y="94">comm = transmon (4–8 GHz Josephson junction)</text>
  <rect class="mo-block" x="93" y="105" width="74" height="26" rx="4"/>
  <text class="badge-text badge-mo" x="130" y="123">M-O · 5 GHz → 1350 nm</text>

  <!-- Three relays caption (centred above relays) -->
  <text class="endpoint" x="534" y="78">3 SiV repeater nodes — Knaut-style integrated nanophotonics</text>
  <text class="endpoint-sub" x="534" y="94">comm = SiV electron spin (737 nm ZPL) · memory = ²⁹Si nuclear spin (T₂ ≥ 1 s)</text>
  <text class="endpoint-sub" x="534" y="124">per-node QFC (PPLN pumped at 1,623 nm) lifts 737 nm → 1,350 nm telecom O-band</text>

  <!-- Node B -->
  <text class="endpoint" x="938" y="78">Node B · Diamond SiV (Knaut)</text>
  <text class="endpoint-sub" x="938" y="94">comm = SiV electron + ²⁹Si memory</text>
  <rect class="qfc-block" x="901" y="105" width="74" height="26" rx="4"/>
  <text class="badge-text badge-qfc" x="938" y="123">QFC · 737 nm → 1350 nm</text>

  <!-- ═══════════ Stage label · Phase 1 ═══════════ -->
  <text class="stage" x="20" y="170">Phase 1</text>

  <!-- ═══════════ Matter-qubit row (y=170) ═══════════ -->
  <!-- A endpoint (transmon) -->
  <circle class="matter" cx="130" cy="170" r="13"/>
  <text class="matter-lbl" x="130" y="170">A</text>

  <!-- R₁ pair (SiV) -->
  <text class="relay-lbl" x="328" y="148">R₁</text>
  <circle class="matter" cx="316" cy="170" r="9"/>
  <circle class="matter" cx="340" cy="170" r="9"/>

  <!-- R₂ pair (SiV) -->
  <text class="relay-lbl" x="534" y="148">R₂</text>
  <circle class="matter" cx="522" cy="170" r="9"/>
  <circle class="matter" cx="546" cy="170" r="9"/>

  <!-- R₃ pair (SiV) -->
  <text class="relay-lbl" x="740" y="148">R₃</text>
  <circle class="matter" cx="728" cy="170" r="9"/>
  <circle class="matter" cx="752" cy="170" r="9"/>

  <!-- B endpoint (SiV) -->
  <circle class="matter" cx="938" cy="170" r="13"/>
  <text class="matter-lbl" x="938" y="170">B</text>

  <!-- ═══════════ Photon row (y=210) ═══════════ -->
  <circle class="photon" cx="130" cy="210" r="5.5"/>
  <circle class="photon" cx="316" cy="210" r="5.5"/>
  <circle class="photon" cx="340" cy="210" r="5.5"/>
  <circle class="photon" cx="522" cy="210" r="5.5"/>
  <circle class="photon" cx="546" cy="210" r="5.5"/>
  <circle class="photon" cx="728" cy="210" r="5.5"/>
  <circle class="photon" cx="752" cy="210" r="5.5"/>
  <circle class="photon" cx="938" cy="210" r="5.5"/>

  <!-- ═══════════ Matter-photon entanglement (mp-waves between matter and photon) ═══════════ -->
  <path class="mp-wave" d="M 130,184 q 3,3 0,6 t 0,6 t 0,6 t 0,6"/>
  <path class="mp-wave" d="M 316,180 q 3,3.5 0,7 t 0,7 t 0,7"/>
  <path class="mp-wave" d="M 340,180 q 3,3.5 0,7 t 0,7 t 0,7"/>
  <path class="mp-wave" d="M 522,180 q 3,3.5 0,7 t 0,7 t 0,7"/>
  <path class="mp-wave" d="M 546,180 q 3,3.5 0,7 t 0,7 t 0,7"/>
  <path class="mp-wave" d="M 728,180 q 3,3.5 0,7 t 0,7 t 0,7"/>
  <path class="mp-wave" d="M 752,180 q 3,3.5 0,7 t 0,7 t 0,7"/>
  <path class="mp-wave" d="M 938,184 q 3,3 0,6 t 0,6 t 0,6 t 0,6"/>

  <!-- ═══════════ Photonic BSMs (4 apparatuses at midpoints, width=90, height=76) ═══════════ -->
  <!-- pBSM₁ at midpoint A-R₁L (centre x=223), pBSM₂ at 431, pBSM₃ at 637, pBSM₄ at 845. Origin x = centre-45. y=255. -->
  <use href="#ph-bsm" x="178" y="255" width="90" height="76"/>
  <use href="#ph-bsm" x="386" y="255" width="90" height="76"/>
  <use href="#ph-bsm" x="592" y="255" width="90" height="76"/>
  <use href="#ph-bsm" x="800" y="255" width="90" height="76"/>

  <!-- pBSM input ports: (origin.x + 26.72, origin.y + 7.03) and (origin.x + 63.28, origin.y + 7.03) -->
  <!-- For pBSM₁: input1 = (204.72, 262.03), input2 = (241.28, 262.03) -->
  <!-- For pBSM₂: (412.72, 262.03), (449.28, 262.03) -->
  <!-- For pBSM₃: (618.72, 262.03), (655.28, 262.03) -->
  <!-- For pBSM₄: (826.72, 262.03), (863.28, 262.03) -->

  <!-- ═══════════ Dashed photon-paths (telecom 1350 nm) ═══════════ -->
  <path class="photon-path" d="M 130,215 L 204.72,262.03"/>
  <path class="photon-path" d="M 316,215 L 241.28,262.03"/>
  <path class="photon-path" d="M 340,215 L 412.72,262.03"/>
  <path class="photon-path" d="M 522,215 L 449.28,262.03"/>
  <path class="photon-path" d="M 546,215 L 618.72,262.03"/>
  <path class="photon-path" d="M 728,215 L 655.28,262.03"/>
  <path class="photon-path" d="M 752,215 L 826.72,262.03"/>
  <path class="photon-path" d="M 938,215 L 863.28,262.03"/>

  <!-- pBSM labels -->
  <text class="pbsm-lbl" x="223" y="346">photonic BSM</text>
  <text class="pbsm-lbl" x="431" y="346">photonic BSM</text>
  <text class="pbsm-lbl" x="637" y="346">photonic BSM</text>
  <text class="pbsm-lbl" x="845" y="346">photonic BSM</text>

  <!-- Wavelength tag (single, between the two leftmost pBSMs to avoid clutter) -->
  <text class="wave-tag" x="328" y="240">all photons at 1,350 nm (telecom O-band, &lt; 0.3 dB/km)</text>

  <!-- Right-margin annotation -->
  <text class="ann" x="1040" y="262">Repeat</text>
  <text class="ann" x="1040" y="280">until</text>
  <text class="ann" x="1040" y="298">success</text>
  <line x1="1040" y1="308" x2="1040" y2="328" stroke="#5a6472" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- 50% ceiling note (under pBSMs, single line) -->
  <text class="footnote" x="550" y="365" text-anchor="middle">linear-optics ceiling 50% per pBSM (Calsamiglia 2001) · SNSPD detection, ~2.5 Hz noise (Knaut Methods)</text>

  <!-- ═══════════ Phase 1 result row · matter-to-matter entanglement ═══════════ -->
  <text class="stage" x="20" y="412">Phase 1 ✓</text>

  <!-- Four magenta wavy lines linking adjacent matter qubits (each = an elementary Bell pair). y=420 -->
  <!-- A ↔ R₁L: x from 143 (A right edge) to 307 (R₁L left edge), span 164, 11 segments × 14.9 -->
  <path class="ent" d="M 143,420 q 7.5,-7 15,0 t 15,0 t 15,0 t 15,0 t 15,0 t 15,0 t 15,0 t 15,0 t 15,0 t 15,0 t 15,0"/>
  <!-- R₁R ↔ R₂L: x from 349 to 513, span 164, same pattern -->
  <path class="ent" d="M 349,420 q 7.5,-7 15,0 t 15,0 t 15,0 t 15,0 t 15,0 t 15,0 t 15,0 t 15,0 t 15,0 t 15,0 t 15,0"/>
  <!-- R₂R ↔ R₃L: x from 555 to 719, span 164 -->
  <path class="ent" d="M 555,420 q 7.5,-7 15,0 t 15,0 t 15,0 t 15,0 t 15,0 t 15,0 t 15,0 t 15,0 t 15,0 t 15,0 t 15,0"/>
  <!-- R₃R ↔ B: x from 761 to 925, span 164 -->
  <path class="ent" d="M 761,420 q 7.5,-7 15,0 t 15,0 t 15,0 t 15,0 t 15,0 t 15,0 t 15,0 t 15,0 t 15,0 t 15,0 t 15,0"/>

  <!-- Matter qubits (still alive, same positions, smaller scale for the result row) -->
  <circle class="matter" cx="130" cy="420" r="13"/><text class="matter-lbl" x="130" y="420">A</text>
  <circle class="matter" cx="316" cy="420" r="9"/><circle class="matter" cx="340" cy="420" r="9"/>
  <circle class="matter" cx="522" cy="420" r="9"/><circle class="matter" cx="546" cy="420" r="9"/>
  <circle class="matter" cx="728" cy="420" r="9"/><circle class="matter" cx="752" cy="420" r="9"/>
  <circle class="matter" cx="938" cy="420" r="13"/><text class="matter-lbl" x="938" y="420">B</text>

  <text class="bell-lbl" x="550" y="396">four elementary Bell pairs (matter–matter) heralded across the chain</text>
  <text class="result-cap" x="550" y="458">→ entanglement swapping at the relays joins these into one end-to-end A↔B Bell pair</text>
  <text class="result-cap" x="550" y="475" font-style="italic" fill="#6b7280">(see swapping page for the chain protocol)</text>

  <!-- ═══════════ Phase 2 — LOCC teleportation ═══════════ -->
  <text class="stage" x="20" y="520">Phase 2</text>

  <!-- Node A local BSM box (data qubit + comm-A consumed) -->
  <rect class="bm-box" x="90" y="530" width="80" height="42" rx="4"/>
  <circle class="data" cx="110" cy="551" r="9"/>
  <text x="110" y="556" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#5a3010">ψ</text>
  <circle class="matter-used" cx="148" cy="551" r="13"/>
  <text class="matter-lbl" x="148" y="551" fill="#7a818a">A</text>
  <text class="phase-cap" x="130" y="592">local BSM at A — consumes the Bell pair</text>

  <!-- Classical channel -->
  <line class="classical" x1="180" y1="551" x2="918" y2="551" marker-end="url(#carr)"/>
  <text class="phase-cap" x="550" y="544" font-weight="600">2 classical bits across the fibre's co-channel</text>
  <text class="phase-cap" x="550" y="572" font-style="italic" fill="#7e5cb4">(quantum channel silent in Phase 2)</text>

  <!-- Node B Pauli correction -->
  <circle class="matter" cx="920" cy="551" r="13"/>
  <text class="matter-lbl" x="920" y="551">B</text>
  <circle class="data" cx="958" cy="551" r="9"/>
  <text x="958" y="556" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#5a3010">ψ</text>
  <text class="phase-cap" x="938" y="592">Pauli correction at B — state lands on the data qubit</text>

  <!-- ═══════════ Footer (citations) ═══════════ -->
  <text class="footnote" x="20" y="700" text-anchor="start">Node B and relays: Knaut et al., <tspan font-style="normal" font-weight="600">Nature 629, 573 (2024)</tspan> — SiV in nanophotonic cavity, ²⁹Si nuclear-spin memory, 737 → 1,350 nm QFC, 35 km deployed Boston-metro fibre.</text>
  <text class="footnote" x="20" y="716" text-anchor="start">Node A (transmon endpoint): per <tspan font-weight="600">IBM × Cisco × Fermilab SQMS</tspan> joint roadmap (Nov 2025) — M-O transducer proof-of-concept targeted 2030.</text>

</svg>
