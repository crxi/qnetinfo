<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 580" role="img">
  <title>4-hop heterogeneous quantum network — transmon QPU + M2O at Node A (in a dilution fridge), 171-Yb+ trap + QFC bench at Node B, three SiV repeaters with internal QFCs along the photonic chain, midpoint BSM at M1-M4 using the QuISP BSA glyph.</title>
