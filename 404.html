<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>We've moved — Quantum Network Infographics</title>
  <meta name="robots" content="noindex">
  <style>
    :root { color-scheme: dark; }
    html, body { height: 100%; margin: 0; }
    body {
      display: grid; place-items: center;
      background: #0b0e14; color: #e6e9ef;
      font: 16px/1.6 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      padding: 1.5rem;
    }
    main { max-width: 32rem; text-align: center; }
    h1 { font-size: 1.6rem; margin: 0 0 0.75rem; font-weight: 650; }
    p { margin: 0.5rem 0; color: #aeb4c2; }
    a.cta {
      display: inline-block; margin-top: 1.25rem; padding: 0.6rem 1.2rem;
      background: #1a4a99; color: #fff; text-decoration: none;
      border-radius: 8px; font-weight: 600;
    }
    a.cta:hover { background: #2159b8; }
  </style>
</head>
<body>
  <main>
    <h1>We've moved</h1>
    <p>This page now lives at <strong>qni.pages.dev</strong>. Taking you there…</p>
    <a class="cta" id="link" href="https://qni.pages.dev/">Continue →</a>
  </main>
  <script>
    // Old project-site paths look like /qnetinfo/<rest>. Map them to
    // qni.pages.dev/<rest> so deep bookmarks land on the same page.
    var rest = location.pathname.replace(/^\/qnetinfo\/?/, "");
    var dest = "https://qni.pages.dev/" + rest + location.search + location.hash;
    document.getElementById("link").href = dest;
    location.replace(dest);
  </script>
</body>
</html>
